{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-md-12">
            <h2 class="mb-4">Admin Dashboard</h2>

            <div class="row row-cols-1 row-cols-md-4 g-4 mb-5">
                <div class="col">
                    <div class="card h-100 bg-primary text-white border-0 shadow-sm">
                        <div class="card-body text-center">
                            <h5 class="card-title">Total Users</h5>
                            <p class="display-4">{{ stats.total_users }}</p>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card h-100 bg-info text-white border-0 shadow-sm">
                        <div class="card-body text-center">
                            <h5 class="card-title">Total Posts</h5>
                            <p class="display-4">{{ stats.total_posts }}</p>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card h-100 bg-success text-white border-0 shadow-sm">
                        <div class="card-body text-center">
                            <h5 class="card-title">Reunited</h5>
                            <p class="display-4">{{ stats.reunited_posts }}</p>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card h-100 bg-warning text-dark border-0 shadow-sm">
                        <div class="card-body text-center">
                            <h5 class="card-title">Active Posts</h5>
                            <p class="display-4">{{ stats.active_posts }}</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 text-primary">Administration Links</h5>
                </div>
                <div class="card-body">
                    <div class="list-group list-group-flush">
                        <a href="/admin/user/" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            Manage Users
                            <i class="bi bi-chevron-right text-muted small"></i>
                        </a>
                        <a href="/admin/petpost/" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            Manage Pet Posts
                            <i class="bi bi-chevron-right text-muted small"></i>
                        </a>
                        <a href="/admin/contactmessage/" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            System Messages
                            <i class="bi bi-chevron-right text-muted small"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
