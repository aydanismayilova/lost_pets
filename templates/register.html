<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeydiyyat - Heyvanlar Platforması</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
            url('https://img.freepik.com/free-photo/cute-puppy-group-sitting-looking-camera-indoors-generated-by-artificial-intelligence_188544-113182.jpg?t=st&w=1380&epik=dj0yJnU9OUREcFFhTXFnSnZVS2V2YlVrN1ByYldNUjk0cm1Mbi0mcD0wJm49NXlaYm1aXzFVUVM3WDR5ZjVhZXZkUSZ0PUFBQUFBR25OcW0w');
            background-size: cover;
            background-position: center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 380px;
            text-align: center;
        }
        h2 { color: #2d3436; margin-bottom: 10px; font-size: 28px; }
        p.subtitle { color: #636e72; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #00b894; }
        button {
            width: 100%;
            padding: 14px;
            background: #00b894;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background: #00947a; transform: translateY(-2px); }
        .footer-text { margin-top: 20px; font-size: 14px; color: #636e72; }
        .footer-text a { color: #00b894; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>Xoş Gəldiniz! 🐾</h2>
        <p class="subtitle">Onlara evini tapmaqda kömək et.</p>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error-box">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="İstifadəçi adı" required>
            <input type="password" name="password" placeholder="Şifrə" required>
            <button type="submit">Qeydiyyatı Tamamla</button>
        </form>
        <div class="footer-text">
            Artıq hesabınız var? <a href="/login">Giriş edin</a>
        </div>
    </div>
</body>
</html>
