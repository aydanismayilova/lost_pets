<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elan Yerləşdir - Heyvanlar Platforması</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
            url('https://img.freepik.com/free-photo/cute-puppy-group-sitting-looking-camera-indoors-generated-by-artificial-intelligence_188544-113182.jpg?t=st&w=1380&epik=dj0yJnU9OUREcFFhTXFnSnZVS2V2YlVrN1ByYldNUjk0cm1Mbi0mcD0wJm49NXlaYm1aXzFVUVM3WDR5ZjVhZXZkUSZ0PUFBQUFBR25OcW0w');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .form-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 500px;
            text-align: center;
        }
        h2 { color: #2d3436; margin-bottom: 10px; font-size: 28px; }
        p.subtitle { color: #636e72; margin-bottom: 25px; }
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus, textarea:focus, select:focus { border-color: #00b894; }
        textarea { resize: vertical; min-height: 80px; }
        button {
            width: 100%;
            padding: 14px;
            background: #00b894;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background: #00947a; transform: translateY(-2px); }
        .error-box {
            background: #ff7675;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .back-link { margin-top: 20px; font-size: 14px; color: #636e72; }
        .back-link a { color: #00b894; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Yeni Elan Yerləşdir 🐾</h2>
        <p class="subtitle">İtirilmiş və ya tapılmış heyvan haqqında məlumat verin.</p>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error-box">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="name" placeholder="Heyvanın adı (məs. Şarik)" required>
            <textarea name="description" placeholder="Təsvir (heyvanın xüsusiyyətləri, itirildiyi yer və vaxt)" required></textarea>
            <input type="text" name="location" placeholder="Yerləşmə (şəhər, rayon)" required>
            <input type="text" name="contact" placeholder="Əlaqə məlumatı (telefon, email)" required>
            <select name="status" required>
                <option value="lost">İtirilib</option>
                <option value="found">Tapılıb</option>
            </select>
            <button type="submit">Elanı Yerləşdir</button>
        </form>
        <div class="back-link">
            <a href="/">← Ana səhifəyə qayıt</a>
        </div>
    </div>
</body>
</html>
