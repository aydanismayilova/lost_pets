<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Heyvanlar Platforması</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            /* Sənin seçdiyin Pinterest şəkli */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://i.pinimg.com/736x/6a/b4/89/6ab4897f56984d4bf0b28445d5fc9457.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 { 
            color: #2d3436; 
            margin-bottom: 10px; 
            font-size: 26px;
            font-weight: 800;
        }

        .welcome-msg {
            color: #636e72;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #dfe6e9;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.9);
        }

        input:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.4s;
        }

        button:hover {
            background: #5649c0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }

        .error-box {
            background: #ff7675;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .signup-link {
            margin-top: 25px;
            font-size: 14px;
            color: #2d3436;
        }

        .signup-link a {
            color: #6c5ce7;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Yenidən Xoş Gəldin! 🐶</h2>
        <p class="welcome-msg">Sənin köməyin onlara ümid verir.</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error-box">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="İstifadəçi adı" required>
            <input type="password" name="password" placeholder="Şifrə" required>
            <button type="submit">Daxil Ol</button>
        </form>

        <div class="signup-link">
            Hesabın yoxdur? <a href="/register">Qeydiyyatdan keç</a>
        </div>
    </div>
</body>
</html>
